<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ch6 · YOLO 目标检测</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/kit/hud.css">
  <style>
    /* YOLO-style detection overlay. The 3-D scene is a small city block
     * (buildings as scenery, cars + pedestrians + signs as detectable
     * targets). The drone camera orbits the block at altitude looking
     * inward; an overlay canvas projects each target's world-space AABB
     * down to a screen-space rectangle and draws a labeled bounding box
     * with a synthesized confidence score. Confidence is a base-rate per
     * class plus a small sinusoidal jitter and an occasional dropout —
     * teaching that detection is a noisy per-frame inference, not a
     * permanent track. There is no actual neural network here; the
     * point is the *interface* viewers will see in real systems. */

    html, body { margin: 0; background: var(--stage-bg); color: var(--label-strong-fg);
                 font-family: "Noto Sans SC", sans-serif; overflow: hidden; }
    #stage { position: relative; width: 100vw; height: 100vh; }
    #overlay {
      position: absolute; left: 0; top: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 5;
    }
    .corner-tag {
      position: absolute; padding: 4px 9px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--label-fg); background: var(--label-bg);
      border: 0.5px solid var(--label-border);
      border-radius: 3px;
      letter-spacing: 0.05em;
      pointer-events: none;
      text-transform: uppercase;
      z-index: 7;
    }
    #feed-tag  { left: 16px; top: 16px; }
    #model-tag { right: 16px; top: 16px; }
    #note {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--label-fg); background: var(--label-bg);
      border: 0.5px solid var(--label-border);
      border-radius: 3px;
      padding: 5px 12px;
      pointer-events: none;
      z-index: 7;
    }
    #legend {
      position: absolute; bottom: 16px; left: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--label-fg); background: var(--label-bg);
      border: 0.5px solid var(--label-border);
      border-radius: 6px;
      padding: 8px 12px;
      pointer-events: none;
      letter-spacing: 0.02em;
      line-height: 1.7;
      z-index: 6;
    }
    #legend .row { display: flex; align-items: center; gap: 8px; }
    #legend .swatch {
      display: inline-block; width: 14px; height: 10px; border-radius: 2px;
      border: 0.5px solid var(--label-border);
    }
    #hint {
      position: absolute; bottom: 18px; right: 56px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--hud-unit);
      pointer-events: none;
      z-index: 7;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <canvas id="overlay"></canvas>
  <div class="corner-tag" id="feed-tag"></div>
  <div class="corner-tag" id="model-tag"></div>
  <div id="note"></div>
  <div id="legend"></div>
  <div id="hint"></div>

  <script type="module">
    import * as THREE from 'three';
    import { createEnvironment } from '/src/kit/Environment.js';
    import { createPanel }       from '/src/kit/Hud.js';
    import { labels }            from '/src/kit/labels.js';
    import { theme, mountThemeToggle, hexToCss } from '/src/kit/theme.js';

    const L = labels.ch06.yolo;
    document.getElementById('feed-tag').textContent  = L.feedTag;
    document.getElementById('model-tag').textContent = L.modelTag;
    document.getElementById('note').textContent      = L.note;
    document.getElementById('hint').textContent      = L.hint;

    // --- Scene --------------------------------------------------------------
    const stage = document.getElementById('stage');
    const { scene, addLights, dispose: disposeEnv } = createEnvironment({
      grid: true, fog: true, floor: true, sceneSize: 60, logoClouds: false,
    });
    addLights();
    mountThemeToggle();

    const camera = new THREE.PerspectiveCamera(56, stage.clientWidth / stage.clientHeight, 0.1, 200);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(stage.clientWidth, stage.clientHeight);
    stage.appendChild(renderer.domElement);

    // --- Buildings (scenery, not detection targets) ------------------------
    const sceneryMat = new THREE.MeshStandardMaterial({
      color: theme.colors.obstacle, roughness: 0.95, metalness: 0.05,
    });
    const sceneryGeos = [];
    const buildings = [
      { x: -7,  z: -6, w: 4.5, h: 6.0, d: 4.0 },
      { x:  6,  z: -7, w: 5.0, h: 7.5, d: 4.5 },
      { x: -8,  z:  5, w: 4.0, h: 4.5, d: 4.0 },
      { x:  7,  z:  6, w: 4.5, h: 5.5, d: 5.0 },
      { x:  0,  z: -10,w: 5.5, h: 4.0, d: 3.5 },
    ];
    for (const b of buildings) {
      const geo = new THREE.BoxGeometry(b.w, b.h, b.d);
      sceneryGeos.push(geo);
      const m = new THREE.Mesh(geo, sceneryMat);
      m.position.set(b.x, b.h / 2, b.z);
      scene.add(m);
    }

    // --- Detection targets --------------------------------------------------
    // Each target carries its 3-D AABB in world space, a class id, and a
    // synthesized confidence model. The AABBs are recomputed each frame
    // (cheap — just centre +/- half-extent) so future moving targets would
    // slot in without changing the projection code.
    const CLASSES = {
      car:    { id: 'car',    label: L.classCar,    color: 0x5dd3ff, baseConf: 0.86 },
      person: { id: 'person', label: L.classPerson, color: 0x5dffb1, baseConf: 0.78 },
      sign:   { id: 'sign',   label: L.classSign,   color: 0xffb454, baseConf: 0.92 },
    };

    const targets = [];
    const targetGeos = [];

    function addCar(x, z, yaw = 0) {
      const w = 1.6, h = 1.3, d = 3.6;
      const geo = new THREE.BoxGeometry(w, h, d);
      targetGeos.push(geo);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x46556b, roughness: 0.5, metalness: 0.3,
      });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, h / 2, z);
      m.rotation.y = yaw;
      scene.add(m);
      targets.push({
        mesh: m, cls: CLASSES.car,
        halfExtents: { x: w/2, y: h/2, z: d/2 },
        // Per-target confidence phase + dropout schedule. Phases are
        // deterministic so the loop replays identically.
        phase: targets.length * 0.7,
        dropAt: ((targets.length * 13) % 17) + 4,  // first dropout at 4–21 s
      });
    }
    function addPerson(x, z) {
      const w = 0.55, h = 1.7, d = 0.55;
      const geo = new THREE.CapsuleGeometry(w * 0.45, h - w, 4, 8);
      targetGeos.push(geo);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x6b4f8a, roughness: 0.85, metalness: 0.05,
      });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, h / 2, z);
      scene.add(m);
      targets.push({
        mesh: m, cls: CLASSES.person,
        halfExtents: { x: w/2, y: h/2, z: d/2 },
        phase: targets.length * 0.9,
        dropAt: ((targets.length * 23) % 19) + 3,
      });
    }
    function addSign(x, z) {
      // Post + plate. Detection box covers the whole stack.
      const postGeo = new THREE.BoxGeometry(0.08, 1.8, 0.08);
      const plateGeo = new THREE.BoxGeometry(0.7, 0.5, 0.05);
      targetGeos.push(postGeo, plateGeo);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x2a2f38, roughness: 0.6, metalness: 0.1,
      });
      const plateMat = new THREE.MeshStandardMaterial({
        color: 0xffb454, roughness: 0.4, metalness: 0.05,
      });
      const post  = new THREE.Mesh(postGeo, mat);
      const plate = new THREE.Mesh(plateGeo, plateMat);
      post.position.set(x, 0.9, z);
      plate.position.set(x, 1.7, z);
      scene.add(post); scene.add(plate);
      // Bounding-box anchor sits at the visual centre of the post+plate stack.
      const anchor = new THREE.Object3D();
      anchor.position.set(x, 1.0, z);
      scene.add(anchor);
      targets.push({
        mesh: anchor, cls: CLASSES.sign,
        halfExtents: { x: 0.40, y: 1.05, z: 0.10 },
        phase: targets.length * 1.1,
        dropAt: ((targets.length * 29) % 23) + 6,
      });
    }

    // Lay out a small block.
    addCar(-2.5,  0.5,  0.10);
    addCar( 1.5, -1.2, -0.18);
    addCar( 3.0,  3.0,  0.55);
    addCar(-1.0,  4.2, -0.45);
    addPerson( 0.4,  1.8);
    addPerson( 2.2,  2.6);
    addPerson(-1.4, -2.0);
    addPerson( 4.0, -0.5);
    addPerson(-3.5,  2.0);
    addSign(-2.0,  3.5);
    addSign( 4.5,  1.0);

    // --- Camera path --------------------------------------------------------
    // Slow orbit at altitude looking inward and slightly down. Loop is 20 s.
    const T_LOOP = 20;
    const cameraTarget = new THREE.Vector3(0, 0.8, 0);
    function cameraAt(t) {
      const u = (t % T_LOOP) / T_LOOP;
      const theta = u * Math.PI * 2 + Math.PI * 0.25;
      const r = 13;
      const y = 6.5 + Math.sin(u * Math.PI * 2 + 0.3) * 0.7;
      return {
        pos: new THREE.Vector3(
          Math.cos(theta) * r,
          y,
          Math.sin(theta) * r,
        ),
        look: cameraTarget,
      };
    }

    // --- Overlay canvas -----------------------------------------------------
    const overlayEl = document.getElementById('overlay');
    const overlayCtx = overlayEl.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    function sizeOverlay() {
      overlayEl.width  = Math.floor(stage.clientWidth  * dpr);
      overlayEl.height = Math.floor(stage.clientHeight * dpr);
      overlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    sizeOverlay();

    // --- Projection helpers -------------------------------------------------
    // Build a single view-projection matrix per frame, then run AABB corners
    // through it manually. Using vec.project(camera) directly gives garbage
    // when a point is behind the camera (post-divide); we want to detect that
    // case via the homogeneous w and bail.
    const matVP = new THREE.Matrix4();
    const corner = new THREE.Vector4();
    function projectCorner(wx, wy, wz, w, h) {
      corner.set(wx, wy, wz, 1).applyMatrix4(matVP);
      if (corner.w <= 0) return null;          // behind camera
      const ndcX = corner.x / corner.w;
      const ndcY = corner.y / corner.w;
      const ndcZ = corner.z / corner.w;
      if (ndcZ > 1) return null;                // beyond far plane
      return {
        x: (ndcX * 0.5 + 0.5) * w,
        y: (1 - (ndcY * 0.5 + 0.5)) * h,
      };
    }

    function projectAABB(target, w, h) {
      const c  = target.mesh.position;
      const he = target.halfExtents;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      let visible = 0;
      for (let dx = -1; dx <= 1; dx += 2)
      for (let dy = -1; dy <= 1; dy += 2)
      for (let dz = -1; dz <= 1; dz += 2) {
        const p = projectCorner(c.x + dx * he.x, c.y + dy * he.y, c.z + dz * he.z, w, h);
        if (!p) continue;
        visible++;
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      // If less than half the corners projected cleanly, skip — likely the
      // target straddles the near plane and the bbox would be unreliable.
      if (visible < 4) return null;
      // Clamp to viewport.
      const x0 = Math.max(0, minX), x1 = Math.min(w, maxX);
      const y0 = Math.max(0, minY), y1 = Math.min(h, maxY);
      if (x1 - x0 < 8 || y1 - y0 < 8) return null;
      return { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
    }

    // --- Confidence model ---------------------------------------------------
    // Per-target: base + sinusoidal jitter + occasional dropout. The dropout
    // window is 0.4 s per cycle anchored at target.dropAt; centred dropout
    // value lands well below the 0.45 threshold so the detection visibly
    // disappears for that beat.
    const CONF_THRESHOLD = 0.45;
    function confidenceAt(target, t) {
      const tt = t % T_LOOP;
      const base = target.cls.baseConf;
      const jitter = Math.sin(tt * 1.7 + target.phase) * 0.05
                   + Math.sin(tt * 3.1 + target.phase * 1.3) * 0.03;
      // Dropout: a soft notch that descends and recovers within ~0.4 s.
      const dt = tt - target.dropAt;
      let dropout = 0;
      if (dt >= -0.4 && dt <= 0.4) {
        const u = dt / 0.4;             // -1..1
        dropout = -0.55 * Math.cos(u * Math.PI / 2);  // negative, shaped
      }
      return Math.max(0, Math.min(1, base + jitter + dropout));
    }

    // --- HUD panels ---------------------------------------------------------
    const detectPanel = createPanel({
      title: L.detectPanel, corner: 'tl', color: 'cyan',
      items: [
        { key: 'count', label: L.countLabel, value: '0' },
      ],
    });
    detectPanel.el.style.top = '54px';
    stage.appendChild(detectPanel.el);

    const statsPanel = createPanel({
      title: L.statsPanel, corner: 'tr', color: 'magenta',
      items: [
        { key: 'avg',   label: L.avgConf,    value: '0.00' },
        { key: 'thr',   label: L.threshold,  value: CONF_THRESHOLD.toFixed(2) },
      ],
    });
    statsPanel.el.style.top = '54px';
    stage.appendChild(statsPanel.el);

    // Legend.
    const legend = document.getElementById('legend');
    function rowSwatch(css, text) {
      const row = document.createElement('div'); row.className = 'row';
      const sw = document.createElement('span'); sw.className = 'swatch';
      sw.style.background = css;
      const tx = document.createElement('span'); tx.textContent = text;
      row.appendChild(sw); row.appendChild(tx); return row;
    }
    legend.appendChild(rowSwatch(hexToCss(CLASSES.car.color),    L.legendCar));
    legend.appendChild(rowSwatch(hexToCss(CLASSES.person.color), L.legendPerson));
    legend.appendChild(rowSwatch(hexToCss(CLASSES.sign.color),   L.legendSign));

    // --- Camera-feed chrome -------------------------------------------------
    // Corner brackets + thin centre crosshair. Drawn once per frame at the
    // top of the overlay so they sit above the bounding-box layer.
    function drawChrome(w, h) {
      const len = 22;
      overlayCtx.strokeStyle = 'rgba(232,236,242,0.35)';
      overlayCtx.lineWidth = 1.5;
      const pad = 12;
      const corners = [
        { x: pad,       y: pad,       hx: 1,  hy: 1  },
        { x: w - pad,   y: pad,       hx: -1, hy: 1  },
        { x: pad,       y: h - pad,   hx: 1,  hy: -1 },
        { x: w - pad,   y: h - pad,   hx: -1, hy: -1 },
      ];
      for (const c of corners) {
        overlayCtx.beginPath();
        overlayCtx.moveTo(c.x, c.y);
        overlayCtx.lineTo(c.x + c.hx * len, c.y);
        overlayCtx.moveTo(c.x, c.y);
        overlayCtx.lineTo(c.x, c.y + c.hy * len);
        overlayCtx.stroke();
      }
      // Centre cross.
      const cx = w / 2, cy = h / 2;
      overlayCtx.strokeStyle = 'rgba(232,236,242,0.22)';
      overlayCtx.lineWidth = 1;
      overlayCtx.beginPath();
      overlayCtx.moveTo(cx - 8, cy); overlayCtx.lineTo(cx + 8, cy);
      overlayCtx.moveTo(cx, cy - 8); overlayCtx.lineTo(cx, cy + 8);
      overlayCtx.stroke();
    }

    // --- Box drawing --------------------------------------------------------
    function drawDetection(box, target, conf) {
      const color = hexToCss(target.cls.color);
      // Bounding rectangle.
      overlayCtx.strokeStyle = color;
      // Confidence near threshold → thinner / softer line; high confidence →
      // bolder. Communicates uncertainty without an extra UI element.
      const alpha = Math.min(1, (conf - CONF_THRESHOLD) / 0.4 + 0.4);
      overlayCtx.globalAlpha = alpha;
      overlayCtx.lineWidth = 1.6;
      overlayCtx.strokeRect(box.x, box.y, box.w, box.h);

      // Label tag at the top-left of the box: `class · 0.87`.
      const text = `${target.cls.label} · ${conf.toFixed(2)}`;
      overlayCtx.font = '500 11px "Noto Sans SC", sans-serif';
      const padX = 5, padY = 3;
      const metrics = overlayCtx.measureText(text);
      const tagW = metrics.width + padX * 2;
      const tagH = 16;
      // Position the tag above the box if there is room, otherwise inside.
      const tagY = box.y - tagH >= 0 ? box.y - tagH : box.y;
      overlayCtx.fillStyle = color;
      overlayCtx.fillRect(box.x, tagY, tagW, tagH);
      overlayCtx.fillStyle = '#07090d';
      overlayCtx.textBaseline = 'middle';
      overlayCtx.fillText(text, box.x + padX, tagY + tagH / 2 + 0.5);
      overlayCtx.globalAlpha = 1;
    }

    // --- Loop ---------------------------------------------------------------
    let loopStart = performance.now() * 0.001;
    (function tick() {
      const now = performance.now() * 0.001;
      const t = (now - loopStart) % T_LOOP;

      // Camera.
      const cam = cameraAt(t);
      camera.position.copy(cam.pos);
      camera.lookAt(cam.look);
      camera.updateMatrixWorld();
      // updateMatrixWorld doesn't refresh matrixWorldInverse — only render()
      // does. Invert here so matVP matches the camera state we just set
      // (otherwise overlay boxes lag behind the 3-D scene by one frame).
      camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
      matVP.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);

      // 3D render.
      renderer.render(scene, camera);

      // Overlay redraw.
      const w = stage.clientWidth, h = stage.clientHeight;
      overlayCtx.clearRect(0, 0, w, h);

      let detectedCount = 0;
      let confSum = 0;
      for (const target of targets) {
        const conf = confidenceAt(target, t);
        if (conf < CONF_THRESHOLD) continue;
        const box = projectAABB(target, w, h);
        if (!box) continue;
        drawDetection(box, target, conf);
        detectedCount++;
        confSum += conf;
      }

      drawChrome(w, h);

      detectPanel.setValue('count', String(detectedCount));
      statsPanel.setValue('avg',
        detectedCount ? (confSum / detectedCount).toFixed(2) : '—');

      requestAnimationFrame(tick);
    })();

    // --- Resize + dispose ---------------------------------------------------
    addEventListener('resize', () => {
      camera.aspect = stage.clientWidth / stage.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(stage.clientWidth, stage.clientHeight);
      sizeOverlay();
    });
    addEventListener('beforeunload', () => {
      for (const g of sceneryGeos) g.dispose();
      for (const g of targetGeos)  g.dispose();
      sceneryMat.dispose();
      detectPanel.dispose(); statsPanel.dispose();
      disposeEnv(); renderer.dispose();
    });
  </script>
</body>
</html>
